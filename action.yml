name: Cloudeval Actions
description: Run CloudEval CLI in GitHub Actions with scoped access keys, gating, reports, PR feedback, and artifacts.
author: CloudEval

# Marketplace badge: GitHub only allows Feather icon names here (not PNG/SVG).
# Product artwork lives in media/ — abstract cloud from cloudeval-frontend (see media/README.md).
branding:
  icon: cloud
  color: blue

inputs:
  access_key:
    description: CloudEval access key (repository secret; use secrets.CLOUDEVAL_ACCESS_KEY).
    required: true
  base_url:
    description: Optional API base URL (CLOUDEVAL_BASE_URL / cloudeval --base-url).
    required: false
    default: ""
  mode:
    description: "Execution mode — review, ask, gate, agent, reports, or nightly."
    required: false
    default: ask
  project_id:
    description: Project id for project-scoped commands.
    required: false
    default: ""
  ask_prompt:
    description: Prompt for ask (or gate/nightly when using ask).
    required: false
    default: ""
  agent_task:
    description: Task for agent mode (when set, ask/gate/nightly use agent instead of ask where applicable).
    required: false
    default: ""
  gate_threshold:
    description: Numeric threshold for gate mode (optional on ask/agent/nightly to enforce a bound).
    required: false
    default: ""
  gate_jq:
    description: jq expression on CLI JSON stdout yielding one number (tonumber applied).
    required: false
    default: .score
  gate_operator:
    description: "How extracted value relates to threshold — ge (>=), gt, le, lte (<=), lt, eq, ne."
    required: false
    default: ge
  summary_answer_jq:
    description: Optional jq expression to pull a short text snippet into the job/PR summary (e.g. .answer).
    required: false
    default: ""
  quiet:
    description: Pass --quiet to cloudeval for cleaner CI logs.
    required: false
    default: "true"
  progress:
    description: CLI progress — use none to pass --progress none (recommended in CI).
    required: false
    default: none
  model:
    description: Optional cloudeval --model.
    required: false
    default: ""
  profile:
    description: Optional cloudeval --profile.
    required: false
    default: ""
  reports_type:
    description: cloudeval reports run / download --type.
    required: false
    default: all
  reports_region:
    description: cloudeval reports run --region (cost reports).
    required: false
    default: eastus
  reports_currency:
    description: cloudeval reports run --currency.
    required: false
    default: USD
  reports_wait:
    description: Pass --wait to reports run (poll until jobs finish).
    required: false
    default: "false"
  reports_poll_interval_ms:
    description: Poll interval when reports_wait is true.
    required: false
    default: "2500"
  reports_download:
    description: Run reports download after reports run.
    required: false
    default: "true"
  reports_output_dir:
    description: Output directory for reports download.
    required: false
    default: cloudeval-reports
  repo:
    description: GitHub repository for review mode. Defaults to github.repository.
    required: false
    default: ""
  ref:
    description: Git branch/ref for review mode. Defaults to github.ref_name.
    required: false
    default: ""
  commit_sha:
    description: Commit SHA for review mode. Defaults to github.sha.
    required: false
    default: ""
  source_root:
    description: Optional IaC source root for GitHub-backed CloudEval projects.
    required: false
    default: ""
  config_path:
    description: Optional path to .cloudeval/config.yaml for review gates.
    required: false
    default: ""
  ignore_dirty:
    description: Pass --ignore-dirty to cloudeval review.
    required: false
    default: "false"
  review_wait:
    description: Wait for GitHub sync and report refresh before writing review output.
    required: false
    default: "true"
  review_wait_timeout_ms:
    description: Maximum time cloudeval review waits for GitHub sync.
    required: false
    default: "900000"
  review_poll_interval_ms:
    description: Poll interval for cloudeval review while waiting.
    required: false
    default: "5000"
  ai_summary:
    description: Include an AI-written summary in review.json, review.md, and PR comments.
    required: false
    default: "true"
  ai_summary_mode:
    description: AI summary mode for review output — ask or agent.
    required: false
    default: ask
  ai_summary_profile:
    description: Agent Profile id when ai_summary_mode is agent.
    required: false
    default: architecture
  review_output_dir:
    description: Output directory for review.json and review.md.
    required: false
    default: cloudeval-review
  working_directory:
    description: Working directory for CLI.
    required: false
    default: .
  cli_install_url:
    description: CloudEval CLI install script URL.
    required: false
    default: https://cli.cloudeval.ai/install.sh
  skip_cli_install:
    description: Skip installer; cloudeval must be on PATH (mirrors, tests).
    required: false
    default: "false"
  post_pr_comment:
    description: Post or update one PR comment (pull-requests write; limited on fork PRs).
    required: false
    default: "false"
  pr_comment_collapsed_details:
    description: Wrap the summary body in a collapsible <details> block in the PR comment.
    required: false
    default: "false"
  pr_comment_json_excerpt:
    description: Append a collapsible JSON excerpt from CLI stdout (truncated) to the PR comment.
    required: false
    default: "false"
  pr_comment_max_json_chars:
    description: Max characters of JSON excerpt in PR comment.
    required: false
    default: "12000"
  upload_artifacts:
    description: Upload staged output (summary, json, reports) as a workflow artifact.
    required: false
    default: "false"
  artifact_name:
    description: Artifact name when upload_artifacts is true.
    required: false
    default: cloudeval-output
  artifact_retention_days:
    description: Artifact retention (days); 0 uses repo default.
    required: false
    default: "14"
  include_run_metadata:
    description: Add run URL, ref, and SHA to markdown summary and PR comment.
    required: false
    default: "true"
  job_summary_title:
    description: Heading for the GitHub Actions job summary.
    required: false
    default: CloudEval

outputs:
  result:
    description: pass or fail
    value: ${{ steps.run.outputs.result }}
  score:
    description: Numeric value when gating ran (same as extracted_value)
    value: ${{ steps.run.outputs.score }}
  extracted_value:
    description: Numeric value from gate_jq when gating ran
    value: ${{ steps.run.outputs.extracted_value }}
  summary_markdown:
    description: Markdown summary
    value: ${{ steps.run.outputs.summary_markdown }}
  summary_file:
    description: Path to summary file on the runner
    value: ${{ steps.run.outputs.summary_file }}
  report_path:
    description: Absolute path to reports directory when download ran
    value: ${{ steps.run.outputs.report_path }}
  json_path:
    description: Path to captured CLI JSON stdout
    value: ${{ steps.run.outputs.json_path }}
  run_url:
    description: URL to this workflow run (when include_run_metadata supplies server env)
    value: ${{ steps.run.outputs.run_url }}

runs:
  using: composite
  steps:
    - name: Install CloudEval CLI
      if: inputs.skip_cli_install != 'true'
      shell: bash
      run: |
        set -euo pipefail
        export PATH="$HOME/.local/bin:$(npm prefix -g)/bin:$PATH"
        installer="${RUNNER_TEMP:-/tmp}/cloudeval-install.sh"
        install_from_script() {
          curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 30 \
            "${{ inputs.cli_install_url }}" -o "$installer"
          bash "$installer"
        }
        if ! install_from_script; then
          echo "::warning::CloudEval CLI installer was unavailable; falling back to npm."
          npm install -g @ganakailabs/cloudeval-cli@latest
        fi
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$(npm prefix -g)/bin" >> "$GITHUB_PATH"
        cloudeval --version

    - name: PR reaction started
      if: inputs.post_pr_comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        RESULT: running
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: bash "${{ github.action_path }}/scripts/pr-reaction.sh"

    - name: Run CloudEval
      id: run
      shell: bash
      env:
        CLOUDEVAL_ACCESS_KEY: ${{ inputs.access_key }}
        INPUT_BASE_URL: ${{ inputs.base_url }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PROJECT_ID: ${{ inputs.project_id }}
        INPUT_ASK_PROMPT: ${{ inputs.ask_prompt }}
        INPUT_AGENT_TASK: ${{ inputs.agent_task }}
        INPUT_GATE_THRESHOLD: ${{ inputs.gate_threshold }}
        INPUT_GATE_JQ: ${{ inputs.gate_jq }}
        INPUT_GATE_OPERATOR: ${{ inputs.gate_operator }}
        INPUT_SUMMARY_ANSWER_JQ: ${{ inputs.summary_answer_jq }}
        INPUT_QUIET: ${{ inputs.quiet }}
        INPUT_PROGRESS: ${{ inputs.progress }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_REPORTS_TYPE: ${{ inputs.reports_type }}
        INPUT_REPORTS_REGION: ${{ inputs.reports_region }}
        INPUT_REPORTS_CURRENCY: ${{ inputs.reports_currency }}
        INPUT_REPORTS_WAIT: ${{ inputs.reports_wait }}
        INPUT_REPORTS_POLL_INTERVAL_MS: ${{ inputs.reports_poll_interval_ms }}
        INPUT_REPORTS_DOWNLOAD: ${{ inputs.reports_download }}
        INPUT_REPORTS_OUTPUT_DIR: ${{ inputs.reports_output_dir }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
        INPUT_SOURCE_ROOT: ${{ inputs.source_root }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        INPUT_IGNORE_DIRTY: ${{ inputs.ignore_dirty }}
        INPUT_REVIEW_WAIT: ${{ inputs.review_wait }}
        INPUT_REVIEW_WAIT_TIMEOUT_MS: ${{ inputs.review_wait_timeout_ms }}
        INPUT_REVIEW_POLL_INTERVAL_MS: ${{ inputs.review_poll_interval_ms }}
        INPUT_AI_SUMMARY: ${{ inputs.ai_summary }}
        INPUT_AI_SUMMARY_MODE: ${{ inputs.ai_summary_mode }}
        INPUT_AI_SUMMARY_PROFILE: ${{ inputs.ai_summary_profile }}
        INPUT_REVIEW_OUTPUT_DIR: ${{ inputs.review_output_dir }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
        INPUT_INCLUDE_RUN_METADATA: ${{ inputs.include_run_metadata }}
        INPUT_JOB_SUMMARY_TITLE: ${{ inputs.job_summary_title }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
      run: bash "${{ github.action_path }}/scripts/run.sh"

    - name: Upload artifact
      if: inputs.upload_artifacts == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ steps.run.outputs.artifact_path }}
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: PR comment
      if: always() && inputs.post_pr_comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SUMMARY_FILE: ${{ steps.run.outputs.summary_file }}
        JSON_PATH: ${{ steps.run.outputs.json_path }}
        RESULT: ${{ steps.run.outputs.result }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        PR_COMMENT_COLLAPSED: ${{ inputs.pr_comment_collapsed_details }}
        PR_COMMENT_JSON_EXCERPT: ${{ inputs.pr_comment_json_excerpt }}
        PR_COMMENT_MAX_JSON_CHARS: ${{ inputs.pr_comment_max_json_chars }}
        INCLUDE_RUN_METADATA: ${{ inputs.include_run_metadata }}
      run: bash "${{ github.action_path }}/scripts/pr-comment.sh"

    - name: PR reaction completed
      if: always() && inputs.post_pr_comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        RESULT: ${{ steps.run.outputs.result }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: bash "${{ github.action_path }}/scripts/pr-reaction.sh"
