name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate action.yml (yaml)
        run: ruby -e "require 'yaml'; YAML.load_file('action.yml')"

      - name: Bash syntax
        run: bash -n scripts/run.sh && bash -n scripts/pr-comment.sh && bash -n scripts/pr-reaction.sh

  mock-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Stub cloudeval (json ask)
        run: |
          mkdir -p bin
          echo $'#!/usr/bin/env bash\nfor a in "$@"; do\n  if [[ "$a" == "ask" ]]; then\n    echo \'{"score":0.95}\'\n    exit 0\n  fi\ndone\necho stub: unexpected args: "$*" >&2\nexit 1' > bin/cloudeval
          chmod +x bin/cloudeval
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Composite action (gate ge)
        uses: ./
        with:
          access_key: cev_live_ak_01MOCKMOCKMOCKMOCK_mockkeyvalue
          skip_cli_install: "true"
          include_run_metadata: "false"
          mode: gate
          ask_prompt: "stub"
          gate_threshold: "0.5"
          gate_jq: ".score"
          gate_operator: ge

      - name: Stub cloudeval (lower score)
        run: |
          echo $'#!/usr/bin/env bash\nfor a in "$@"; do\n  if [[ "$a" == "ask" ]]; then\n    echo \'{"score":0.2}\'\n    exit 0\n  fi\ndone\necho stub: unexpected args: "$*" >&2\nexit 1' > bin/cloudeval
          chmod +x bin/cloudeval

      - name: Composite action (gate lt pass)
        uses: ./
        with:
          access_key: cev_live_ak_01MOCKMOCKMOCKMOCK_mockkeyvalue
          skip_cli_install: "true"
          include_run_metadata: "false"
          mode: gate
          ask_prompt: "stub"
          gate_threshold: "0.5"
          gate_jq: ".score"
          gate_operator: lt

  mock-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Stub cloudeval (review)
        run: |
          mkdir -p bin
          cat > bin/cloudeval <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$*" > "${RUNNER_TEMP:-/tmp}/cloudeval-args.txt"
          outdir="cloudeval-review"
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --output)
                outdir="$2"
                shift 2
                ;;
              *)
                shift
                ;;
            esac
          done
          mkdir -p "$outdir"
          echo "## Review summary" > "$outdir/review.md"
          echo '{"data":{"gate":{"overallScore":91,"status":"pass"}}}'
          EOF
          chmod +x bin/cloudeval
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Composite action (review)
        uses: ./
        with:
          access_key: cev_live_ak_01MOCKMOCKMOCKMOCK_mockkeyvalue
          skip_cli_install: "true"
          include_run_metadata: "false"
          mode: review
          project_id: project-github
          repo: ganakailabs/example
          ref: main
          commit_sha: abc123
          ai_summary_mode: agent
          ai_summary_profile: architecture

      - name: Assert review summary mode forwarding
        run: |
          grep -- '--ai-summary-mode agent' "$RUNNER_TEMP/cloudeval-args.txt"
          grep -- '--ai-summary-profile architecture' "$RUNNER_TEMP/cloudeval-args.txt"
