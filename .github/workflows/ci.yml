name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate action.yml (yaml)
        run: ruby -e "require 'yaml'; YAML.load_file('action.yml')"

      - name: Bash syntax
        run: bash -n scripts/run.sh && bash -n scripts/pr-comment.sh && bash -n scripts/pr-reaction.sh

  mock-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Stub cloudeval (json ask)
        run: |
          mkdir -p bin
          echo $'#!/usr/bin/env bash\nfor a in "$@"; do\n  if [[ "$a" == "ask" ]]; then\n    echo \'{"score":0.95}\'\n    exit 0\n  fi\ndone\necho stub: unexpected args: "$*" >&2\nexit 1' > bin/cloudeval
          chmod +x bin/cloudeval
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Composite action (gate ge)
        uses: ./
        with:
          access_key: cev_live_ak_01MOCKMOCKMOCKMOCK_mockkeyvalue
          skip_cli_install: "true"
          include_run_metadata: "false"
          mode: gate
          ask_prompt: "stub"
          gate_threshold: "0.5"
          gate_jq: ".score"
          gate_operator: ge

      - name: Stub cloudeval (lower score)
        run: |
          echo $'#!/usr/bin/env bash\nfor a in "$@"; do\n  if [[ "$a" == "ask" ]]; then\n    echo \'{"score":0.2}\'\n    exit 0\n  fi\ndone\necho stub: unexpected args: "$*" >&2\nexit 1' > bin/cloudeval
          chmod +x bin/cloudeval

      - name: Composite action (gate lt pass)
        uses: ./
        with:
          access_key: cev_live_ak_01MOCKMOCKMOCKMOCK_mockkeyvalue
          skip_cli_install: "true"
          include_run_metadata: "false"
          mode: gate
          ask_prompt: "stub"
          gate_threshold: "0.5"
          gate_jq: ".score"
          gate_operator: lt

  mock-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Stub cloudeval (review)
        run: |
          mkdir -p bin
          cat > bin/cloudeval <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$*" > "${RUNNER_TEMP:-/tmp}/cloudeval-args.txt"
          outdir="cloudeval-review"
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --output)
                outdir="$2"
                shift 2
                ;;
              *)
                shift
                ;;
            esac
          done
          mkdir -p "$outdir"
          cat > "$outdir/review.md" <<'MD'
          ## CloudEval infrastructure review

          | Signal | Result |
          | --- | --- |
          | Merge gate | 🟢 **PASS** |
          | Observed posture | 🟢 **91/100 (EXCELLENT)** |

          ### Links

          [![Workflow](https://img.shields.io/badge/Workflow-run-475569?style=flat-square)](https://github.com/ganakailabs/example/actions/runs/123456789)

          <details>
          <summary><strong>Cost drilldown</strong></summary>

          ```mermaid
          xychart-beta
            title "Monthly cost impact"
            x-axis ["Current", "Optimized"]
            y-axis "USD/mo" 0 --> 42
            bar [42, 35]
          ```

          </details>
          MD
          echo '{"data":{"gate":{"overallScore":91,"status":"pass"}}}'
          EOF
          chmod +x bin/cloudeval
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Composite action (review)
        id: review
        uses: ./
        with:
          access_key: cev_live_ak_01MOCKMOCKMOCKMOCK_mockkeyvalue
          skip_cli_install: "true"
          include_run_metadata: "true"
          mode: review
          project_id: project-github
          repo: ganakailabs/example
          ref: main
          commit_sha: abc123
          ai_summary_mode: agent
          ai_summary_profile: architecture

      - name: Assert review summary mode forwarding
        run: |
          grep -- '--ai-summary-mode agent' "$RUNNER_TEMP/cloudeval-args.txt"
          grep -- '--ai-summary-profile architecture' "$RUNNER_TEMP/cloudeval-args.txt"
          summary_file='${{ steps.review.outputs.summary_file }}'
          grep -- '## CloudEval infrastructure review' "$summary_file"
          grep -- 'img.shields.io/badge/Workflow-run' "$summary_file"
          test "$(grep -o 'actions/runs' "$summary_file" | wc -l | tr -d ' ')" = "1"
          ! grep -- '\*\*Workflow run\*\*' "$summary_file"
