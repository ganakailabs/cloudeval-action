name: CloudEval (reusable)

# Call from another repository:
#   jobs:
#     eval:
#       uses: ganakailabs/cloudeval-action/.github/workflows/cloudeval-reusable.yml@v1
#       secrets:
#         CLOUDEVAL_ACCESS_KEY: ${{ secrets.CLOUDEVAL_ACCESS_KEY }}

on:
  workflow_call:
    secrets:
      CLOUDEVAL_ACCESS_KEY:
        description: Scoped CloudEval access key (cev_…)
        required: true
    inputs:
      mode:
        type: string
        required: false
        default: ask
      base_url:
        type: string
        required: false
        default: ""
      project_id:
        type: string
        required: false
        default: ""
      ask_prompt:
        type: string
        required: false
        default: ""
      agent_task:
        type: string
        required: false
        default: ""
      gate_threshold:
        type: string
        required: false
        default: ""
      gate_jq:
        type: string
        required: false
        default: .score
      gate_operator:
        type: string
        required: false
        default: ge
      summary_answer_jq:
        type: string
        required: false
        default: ""
      quiet:
        type: boolean
        required: false
        default: true
      progress:
        type: string
        required: false
        default: none
      model:
        type: string
        required: false
        default: ""
      profile:
        type: string
        required: false
        default: ""
      reports_type:
        type: string
        required: false
        default: all
      reports_region:
        type: string
        required: false
        default: eastus
      reports_currency:
        type: string
        required: false
        default: USD
      reports_wait:
        type: boolean
        required: false
        default: false
      reports_poll_interval_ms:
        type: string
        required: false
        default: "2500"
      reports_download:
        type: boolean
        required: false
        default: true
      reports_output_dir:
        type: string
        required: false
        default: cloudeval-reports
      repo:
        type: string
        required: false
        default: ""
      ref:
        type: string
        required: false
        default: ""
      commit_sha:
        type: string
        required: false
        default: ""
      source_root:
        type: string
        required: false
        default: ""
      config_path:
        type: string
        required: false
        default: ""
      ignore_dirty:
        type: boolean
        required: false
        default: false
      review_wait:
        type: boolean
        required: false
        default: true
      review_wait_timeout_ms:
        type: string
        required: false
        default: "900000"
      review_poll_interval_ms:
        type: string
        required: false
        default: "5000"
      ai_summary:
        type: boolean
        required: false
        default: true
      ai_summary_mode:
        type: string
        required: false
        default: ask
      ai_summary_profile:
        type: string
        required: false
        default: architecture
      review_output_dir:
        type: string
        required: false
        default: cloudeval-review
      working_directory:
        type: string
        required: false
        default: .
      post_pr_comment:
        type: boolean
        required: false
        default: false
      pr_comment_collapsed_details:
        type: boolean
        required: false
        default: true
      pr_comment_json_excerpt:
        type: boolean
        required: false
        default: false
      pr_comment_max_json_chars:
        type: string
        required: false
        default: "12000"
      upload_artifacts:
        type: boolean
        required: false
        default: false
      artifact_name:
        type: string
        required: false
        default: cloudeval-output
      artifact_retention_days:
        type: string
        required: false
        default: "14"
      include_run_metadata:
        type: boolean
        required: false
        default: true
      job_summary_title:
        type: string
        required: false
        default: CloudEval

permissions:
  contents: read
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: CloudEval
        uses: ganakailabs/cloudeval-action@v1
        with:
          access_key: ${{ secrets.CLOUDEVAL_ACCESS_KEY }}
          base_url: ${{ inputs.base_url }}
          mode: ${{ inputs.mode }}
          project_id: ${{ inputs.project_id }}
          ask_prompt: ${{ inputs.ask_prompt }}
          agent_task: ${{ inputs.agent_task }}
          gate_threshold: ${{ inputs.gate_threshold }}
          gate_jq: ${{ inputs.gate_jq }}
          gate_operator: ${{ inputs.gate_operator }}
          summary_answer_jq: ${{ inputs.summary_answer_jq }}
          quiet: ${{ inputs.quiet }}
          progress: ${{ inputs.progress }}
          model: ${{ inputs.model }}
          profile: ${{ inputs.profile }}
          reports_type: ${{ inputs.reports_type }}
          reports_region: ${{ inputs.reports_region }}
          reports_currency: ${{ inputs.reports_currency }}
          reports_wait: ${{ inputs.reports_wait }}
          reports_poll_interval_ms: ${{ inputs.reports_poll_interval_ms }}
          reports_download: ${{ inputs.reports_download }}
          reports_output_dir: ${{ inputs.reports_output_dir }}
          repo: ${{ inputs.repo }}
          ref: ${{ inputs.ref }}
          commit_sha: ${{ inputs.commit_sha }}
          source_root: ${{ inputs.source_root }}
          config_path: ${{ inputs.config_path }}
          ignore_dirty: ${{ inputs.ignore_dirty }}
          review_wait: ${{ inputs.review_wait }}
          review_wait_timeout_ms: ${{ inputs.review_wait_timeout_ms }}
          review_poll_interval_ms: ${{ inputs.review_poll_interval_ms }}
          ai_summary: ${{ inputs.ai_summary }}
          ai_summary_mode: ${{ inputs.ai_summary_mode }}
          ai_summary_profile: ${{ inputs.ai_summary_profile }}
          review_output_dir: ${{ inputs.review_output_dir }}
          working_directory: ${{ inputs.working_directory }}
          post_pr_comment: ${{ inputs.post_pr_comment }}
          pr_comment_collapsed_details: ${{ inputs.pr_comment_collapsed_details }}
          pr_comment_json_excerpt: ${{ inputs.pr_comment_json_excerpt }}
          pr_comment_max_json_chars: ${{ inputs.pr_comment_max_json_chars }}
          upload_artifacts: ${{ inputs.upload_artifacts }}
          artifact_name: ${{ inputs.artifact_name }}
          artifact_retention_days: ${{ inputs.artifact_retention_days }}
          include_run_metadata: ${{ inputs.include_run_metadata }}
          job_summary_title: ${{ inputs.job_summary_title }}
